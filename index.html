<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Gojo's Infinity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Overlay "Otoč telefon" — zobrazí se v portrait režimu */
    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 9999;
      text-align: center;
    }

    #rotate-msg span {
      font-size: 64px;
    }

    #rotate-msg p {
      font-size: 20px;
      opacity: 0.8;
    }

    @media (orientation: portrait) {
      #rotate-msg { display: flex; }
    }
  </style>
</head>
<body>
  <!-- Overlay pro portrait režim -->
  <div id="rotate-msg">
    <span>🔄</span>
    <p>Otoč telefon do landscape režimu</p>
  </div>

  <!-- Phaser 3 přes CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- UI komponenty — musí být před scénami -->
  <script src="src/ui/HUD.js"></script>
  <script src="src/ui/MobileControls.js"></script>

  <!-- Entity (postavy) — musí být před scénami -->
  <script src="src/entities/Gojo.js"></script>
  <script src="src/entities/SmallCurse.js"></script>
  <script src="src/entities/LargeCurse.js"></script>
  <script src="src/entities/Sorcerer.js"></script>
  <script src="src/entities/Sukuna.js"></script>
  <script src="src/entities/Boss.js"></script>

  <!-- Herní scény -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/scenes/WinScene.js"></script>
  <script src="src/scenes/Level1Scene.js"></script>
  <script src="src/scenes/Level2Scene.js"></script>
  <script src="src/scenes/Level3Scene.js"></script>

  <!-- Inicializace hry -->
  <script src="src/main.js"></script>
</body>
</html>
