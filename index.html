<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Gojo's Infinity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Phaser container — plná obrazovka */
    #game {
      position: fixed;
      inset: 0;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Mobilní ovládání — postranní panely ──────────────── */
    /* Tlačítka jsou na levé a pravé straně, v oblastech kde jsou
       stejně černé pruhy (hra 16:9, telefon ~20:9).
       pointer-events: none na wrapperech aby hra šla kliknout skrz střed */
    #mobile-controls {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      align-items: center;
      justify-content: space-between;
    }

    body.touch-device #mobile-controls {
      display: flex;
    }

    #mc-left {
      display: flex;
      flex-direction: row;
      gap: 12px;
      padding: 16px 10px;
      pointer-events: all;
    }

    #mc-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 10px;
      pointer-events: all;
    }

    #mobile-controls button {
      width: clamp(52px, 9vh, 80px);
      height: clamp(52px, 9vh, 80px);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(20, 20, 50, 0.82);
      color: #fff;
      font-size: clamp(18px, 3vh, 26px);
      line-height: 1;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, border-color 0.08s;
    }

    #mobile-controls button.active {
      background: rgba(120, 80, 220, 0.92);
      border-color: rgba(255,255,255,0.8);
    }

    #btn-z    { background: rgba(76,  29, 149, 0.85); }
    #btn-x    { background: rgba(131, 24,  67, 0.85); }
    #btn-jump { background: rgba(20,  83,  45, 0.85); }

    /* ── Overlay "Otoč telefon" ─────────────────────────── */
    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 9999;
      text-align: center;
    }

    #rotate-msg span { font-size: 64px; }
    #rotate-msg p    { font-size: 20px; opacity: 0.8; }

    @media (orientation: portrait) {
      body.touch-device #rotate-msg { display: flex; }
    }
  </style>
</head>
<body>
  <!-- Phaser se renderuje sem — plná obrazovka -->
  <div id="game"></div>

  <!-- Mobilní ovládání — postranní panely (v černých pruzích po stranách hry) -->
  <div id="mobile-controls">
    <div id="mc-left">
      <button id="btn-left"  data-key="left">←</button>
      <button id="btn-right" data-key="right">→</button>
    </div>
    <div id="mc-right">
      <button id="btn-z"    data-key="z">Z</button>
      <button id="btn-x"    data-key="x">X</button>
      <button id="btn-jump" data-key="jump">↑</button>
    </div>
  </div>

  <!-- Overlay pro portrait režim -->
  <div id="rotate-msg">
    <span>🔄</span>
    <p>Otoč telefon do landscape režimu</p>
  </div>

  <!-- Phaser 3 přes CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- UI komponenty — musí být před scénami -->
  <script src="src/ui/HUD.js"></script>
  <script src="src/ui/MobileControls.js"></script>

  <!-- Entity (postavy) — musí být před scénami -->
  <script src="src/entities/Gojo.js"></script>
  <script src="src/entities/SmallCurse.js"></script>
  <script src="src/entities/LargeCurse.js"></script>
  <script src="src/entities/Sorcerer.js"></script>
  <script src="src/entities/Sukuna.js"></script>
  <script src="src/entities/Boss.js"></script>

  <!-- Herní scény -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/scenes/WinScene.js"></script>
  <script src="src/scenes/Level1Scene.js"></script>
  <script src="src/scenes/Level2Scene.js"></script>
  <script src="src/scenes/Level3Scene.js"></script>

  <!-- Inicializace hry -->
  <script src="src/main.js"></script>

  <!-- Mobilní ovládání — inicializace -->
  <script>
    window.mobileInput = { left: false, right: false, jump: false, z: false, x: false };

    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.body.classList.add('touch-device');

      // Při prvním dotyku požádáme o fullscreen — skryje adresní lištu
      document.addEventListener('touchstart', function requestFS() {
        const el = document.documentElement;
        if (el.requestFullscreen)            el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        document.removeEventListener('touchstart', requestFS);
      }, { once: true });

      document.querySelectorAll('#mobile-controls button').forEach(btn => {
        const key = btn.dataset.key;

        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          window.mobileInput[key] = true;
          btn.classList.add('active');
        }, { passive: false });

        btn.addEventListener('touchend', e => {
          e.preventDefault();
          window.mobileInput[key] = false;
          btn.classList.remove('active');
        }, { passive: false });

        btn.addEventListener('touchcancel', e => {
          e.preventDefault();
          window.mobileInput[key] = false;
          btn.classList.remove('active');
        }, { passive: false });
      });
    }
  </script>
</body>
</html>
